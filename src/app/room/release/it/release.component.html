<div class="card shadow-sm border-0 border-top border-4 border-rose">
    <div class="card-header bg-white py-3 d-flex align-items-center justify-content-between">
        <h5 class="mb-0 fw-bold text-rose"><i class="bi bi-box-arrow-up me-2"></i> Release IT Item</h5>
        <a [routerLink]="['list']" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            <i class="bi bi-list-ul me-1"></i> Release List
        </a>
    </div>
    <div class="card-body p-4">
        <form [formGroup]="releaseForm" (ngSubmit)="submit()">
            <div class="row g-4">
                <!-- Item Selection -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold mb-1">Select IT Item</label>
                    <select formControlName="itInventoryId" class="form-select"
                        [ngClass]="{ 'is-invalid': releaseForm.get('itInventoryId')?.touched && releaseForm.get('itInventoryId')?.invalid }">
                        <option [ngValue]="null">-- Select IT Item --</option>
                        <option *ngFor="let it of inventory" [ngValue]="it.itInventoryId">
                            {{it.itName}} ({{it.itBrand}} - {{it.itModel}}) - Pk: {{it.itInventoryId}}
                        </option>
                    </select>
                    <div *ngIf="inventory.length === 0" class="form-text text-danger">No IT items available for this
                        room!</div>
                </div>

                <!-- Release Quantity -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold mb-1">Release Quantity</label>
                    <input type="number" formControlName="releaseQuantity" class="form-control"
                        [ngClass]="{ 'is-invalid': releaseForm.get('releaseQuantity')?.touched && releaseForm.get('releaseQuantity')?.invalid }">
                    <div class="invalid-feedback">At least 1 item must be released</div>
                </div>

                <!-- Claimed By (Person receiving/taking it) -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold mb-1">Claimed/Picked up by</label>
                    <input type="text" formControlName="claimedBy" class="form-control" placeholder="Name of claimant"
                        [ngClass]="{ 'is-invalid': releaseForm.get('claimedBy')?.touched && releaseForm.get('claimedBy')?.invalid }">
                    <div class="invalid-feedback">Claimed by name is required</div>
                </div>

                <!-- Released By (The staff member) -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold mb-1">Released By (Authorized Personnel)</label>
                    <input type="text" formControlName="releasedBy" class="form-control" placeholder="Staff identifier"
                        [ngClass]="{ 'is-invalid': releaseForm.get('releasedBy')?.touched && releaseForm.get('releasedBy')?.invalid }">
                    <div class="invalid-feedback">Authorized released by is required</div>
                </div>

                <!-- Remarks -->
                <div class="col-12">
                    <label class="form-label fw-semibold mb-1">Remarks / Notes</label>
                    <textarea formControlName="remarks" class="form-control" rows="3"
                        placeholder="Add any specific notes about this release..."></textarea>
                </div>

                <div class="col-12 mt-4 pt-2">
                    <hr class="text-muted opacity-25">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" (click)="router.navigate(['../'], { relativeTo: route })"
                            class="btn btn-light rounded-pill px-4 fw-600">Cancel</button>
                        <button type="submit" class="btn btn-primary rounded-pill px-4 fw-600 shadow-sm"
                            [disabled]="submitting">
                            <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
                            <i *ngIf="!submitting" class="bi bi-check-circle me-1"></i> Release Item
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
