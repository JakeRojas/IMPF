<div class="container py-2">
    <h4>Receive IT Item (Room #{{ roomId }})</h4>

    <form [formGroup]="receiveForm" (ngSubmit)="submit()">
        <div class="row">
            <div class="col-md-6 mb-2">
                <label class="form-label">IT Name <span class="text-danger">*</span></label>
                <input class="form-control" formControlName="itName" placeholder="e.g. Laptop, Printer" />
                <div *ngIf="receiveForm.get('itName')?.touched && receiveForm.get('itName')?.invalid"
                    class="text-danger small">Name is required</div>
            </div>
            <div class="col-md-6 mb-2">
                <label class="form-label">Serial Number</label>
                <input class="form-control" formControlName="itSerialNumber" placeholder="e.g. SN-123456" />
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-2">
                <label class="form-label">Model</label>
                <input class="form-control" formControlName="itModel" placeholder="e.g. ThinkPad X1" />
            </div>
            <div class="col-md-4 mb-2">
                <label class="form-label">Brand</label>
                <input class="form-control" formControlName="itBrand" placeholder="e.g. Lenovo, HP" />
            </div>
            <div class="col-md-4 mb-2">
                <label class="form-label">Size / Spec</label>
                <input class="form-control" formControlName="itSize" placeholder="e.g. 14-inch, 8GB RAM" />
            </div>
        </div>

        <div class="row">
            <div class="col-md-3 mb-2">
                <label class="form-label">Quantity <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="itQuantity" min="1" />
                <div *ngIf="receiveForm.get('itQuantity')?.touched && receiveForm.get('itQuantity')?.invalid"
                    class="text-danger small">Quantity must be at least 1</div>
            </div>

            <div class="col-md-4 mb-2">
                <label class="form-label">Received From <span class="text-danger">*</span></label>
                <input class="form-control" formControlName="receivedFrom" />
                <div *ngIf="receiveForm.get('receivedFrom')?.touched && receiveForm.get('receivedFrom')?.invalid"
                    class="text-danger small">Required</div>
            </div>

            <div class="col-md-5 mb-2">
                <label class="form-label">Received By</label>
                <ng-container *ngIf="currentUserName">
                    <input class="form-control" [value]="currentUserName" readonly />
                    <input type="hidden" formControlName="receivedBy" />
                </ng-container>
            </div>
        </div>

        <div class="mb-2">
            <label class="form-label">Notes</label>
            <textarea class="form-control" formControlName="notes" rows="2"></textarea>
        </div>

        <button class="btn btn-primary" type="submit" [disabled]="submitting">
            {{ submitting ? 'Receiving...' : 'Receive IT Item' }}
        </button>
    </form>
</div>
